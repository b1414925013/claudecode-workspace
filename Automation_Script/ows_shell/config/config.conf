# 连接配置
SSH_USER="user"
SSH_HOST="1.2.3"
SSH_PASS="password1"

# Root 配置
ROOT_PASS="password2"

# 连接超时时间（秒）
TIMEOUT=30

# Docker 配置
DOCKER_IMAGE="xxxx"
DOCKER_PASS="password3"

# 服务器节点配置
# 格式：NODE_节点名="IP1,IP2,IP3"
# 节点名可自定义，IP数量可变，用逗号分隔
# 支持 IPv4 和 IPv6
NODE_master-db="4.5.6.7,5.6.7.8,AA22:BB11:1122:CDEF:1234:AA99:7654:7410"
# NODE_节点名="IP1,IP2"