<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试报告 - $timestamp</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #f0f2f5; color: #1a1a2e; line-height: 1.6;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff; border-radius: 16px; padding: 36px 40px; margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,.15);
  }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
  header .sub { margin-top: 8px; font-size: 14px; opacity: .75; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 16px; margin-bottom: 24px; }
  .card {
    background: #fff; border-radius: 12px; padding: 22px 16px; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.06); transition: transform .2s, box-shadow .2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
  .card .num { font-size: 32px; font-weight: 800; line-height: 1.2; }
  .card .label { font-size: 13px; color: #666; margin-top: 4px; }
  .card-total .num { color: #1a1a2e; }
  .card-pass .num { color: #22c55e; }
  .card-fail .num { color: #ef4444; }
  .card-error .num { color: #f59e0b; }
  .card-rate .num { color: #3b82f6; }

  .progress-wrap { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .progress-bar { height: 10px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); border-radius: 99px; transition: width .6s; }
  .progress-label { text-align: right; font-size: 13px; color: #888; margin-top: 6px; }

  .table-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; margin-bottom: 32px; }
  .table-card h2 { font-size: 18px; padding: 20px 24px 0; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 14px 16px; font-size: 12px; font-weight: 600; color: #888;
    text-transform: uppercase; letter-spacing: .5px; border-bottom: 2px solid #f0f2f5; }
  td { padding: 12px 16px; border-bottom: 1px solid #f0f2f5; font-size: 14px; }
  tr { transition: background .15s; }
  tr:hover { background: #f8fafc; }
  .row-pass td { border-left: 3px solid #22c55e; }
  .row-failed td { border-left: 3px solid #ef4444; }
  .row-error td { border-left: 3px solid #f59e0b; }
  .col-id { font-family: "SF Mono","Fira Code",monospace; font-weight: 600; }
  .col-priority { text-align: center; }

  .badge { display: inline-block; padding: 2px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; letter-spacing: .3px; }
  .badge-passed { background: #dcfce7; color: #166534; }
  .badge-failed { background: #fce4ec; color: #c62828; }
  .badge-error { background: #fff3e0; color: #e65100; }
  .badge-unknown { background: #f3f4f6; color: #6b7280; }

  footer { text-align: center; padding: 32px 0 16px; font-size: 12px; color: #999; }

  @media (max-width:640px) {
    header { padding: 24px 20px; }
    .stats { grid-template-columns: repeat(2,1fr); }
    table { font-size: 13px; }
    td, th { padding: 10px 12px; }
  }
</style>
</head>
<body>
<div class="container" id="top">
  <header>
    <h1>测试报告</h1>
    <div class="sub">生成时间: $report_time</div>
  </header>

  $stat_cards
  $progress_bar

  <div class="table-card">
    <h2>测试用例列表 — 点击各行跳转到详情</h2>
    <table>
      <thead><tr>
        <th>用例编号</th><th>模块</th><th>功能点</th><th>优先级</th><th>状态</th>
      </tr></thead>
      <tbody>$table_rows</tbody>
    </table>
  </div>

  <footer>Claude Code 自动化测试工具</footer>
</div>
</body>
</html>
